<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VORTEX AI Offline Escape Map — real-time GPS, disaster zones, shelters & pre-computed escape routes that work without internet." />
  <title>VORTEX AI — Offline Escape Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/map.css" />
</head>
<body>

  <!-- ===== Top Bar ===== -->
  <header id="top-bar">
    <div class="top-bar__title">
      <span class="top-bar__logo">◈</span>
      VORTEX<span class="top-bar__ai">AI</span>
      <span class="top-bar__sep">—</span>
      <span class="top-bar__subtitle">Offline Escape Map</span>
    </div>
    <div id="offline-badge" class="offline-badge hidden" aria-live="polite">
      <span class="offline-badge__dot"></span> OFFLINE
    </div>
    <button class="top-bar__back" onclick="window.location.href='/'">&#8592; Back</button>
  </header>

  <!-- ===== Disaster Selector Panel ===== -->
  <div id="disaster-panel" class="disaster-panel">
    <button class="disaster-btn" data-type="earthquake" aria-label="Show earthquake zones">
      <span class="disaster-btn__icon">🔴</span>
      <span class="disaster-btn__label">Earthquake</span>
    </button>
    <button class="disaster-btn" data-type="cyclone" aria-label="Show cyclone zones">
      <span class="disaster-btn__icon">🟠</span>
      <span class="disaster-btn__label">Cyclone</span>
    </button>
    <button class="disaster-btn" data-type="flood" aria-label="Show flood zones">
      <span class="disaster-btn__icon">🔵</span>
      <span class="disaster-btn__label">Flood</span>
    </button>
  </div>

  <!-- ===== Map Container ===== -->
  <div id="map"></div>

  <!-- ===== Bottom Info Bar ===== -->
  <footer id="bottom-bar">
    <div id="gps-status" class="bottom-bar__gps">
      <span class="bottom-bar__gps-icon">📍</span>
      <span id="gps-text">Acquiring GPS location…</span>
    </div>
    <div id="shelter-info" class="bottom-bar__shelter hidden">
      <span class="bottom-bar__shelter-icon">🏥</span>
      <span id="shelter-text"></span>
    </div>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- App JS (order matters) -->
  <script src="js/location.js"></script>
  <script src="js/disaster.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
